apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: attestation-service
  labels:
    {{- include "coco-trustee.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.as.replicaCount }}
  serviceName: as
  selector:
    matchLabels:
      app: attestation-service
      {{- include "coco-trustee.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.as.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: attestation-service
        {{- include "coco-trustee.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.as.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.as.podSecurityContext | nindent 8 }}
      {{- if and .Values.kbs.autoGenerateKeys (not .Values.kbs.userKeysSecretName) }}
      initContainers:
        - name: setup-keys
          image: alpine/openssl:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e
              KEY_DIR="/opt/confidential-containers/kbs/user-keys"

              # Generate token-related keys if they don't exist
              cd "$KEY_DIR"
              if [ ! -s token.key ]; then
                echo "Generating token keys..."
                openssl genrsa -traditional -out ca.key 2048
                openssl req -new -key ca.key -out ca-req.csr -subj "/O=CNCF/OU=CoCo/CN=KBS-compose-root"
                openssl req -x509 -days 3650 -key ca.key -in ca-req.csr -out ca-cert.pem
                openssl ecparam -name prime256v1 -genkey -noout -out token.key
                openssl req -new -key token.key -out token-req.csr -subj "/O=CNCF/OU=CoCo/CN=CoCo-AS"
                openssl x509 -req -in token-req.csr -CA ca-cert.pem -CAkey ca.key -CAcreateserial -out token-cert.pem -extensions req_ext
                cat token-cert.pem ca-cert.pem > token-cert-chain.pem
              fi

              echo "Key generation completed"
          volumeMounts:
            - name: user-keys
              mountPath: /opt/confidential-containers/kbs/user-keys
      {{- end }}
      containers:
        - name: as
          securityContext:
            {{- toYaml .Values.as.securityContext | nindent 12 }}
          image: "{{ .Values.as.image.repository }}:{{ .Values.as.image.tag }}"
          imagePullPolicy: {{ .Values.as.image.pullPolicy }}
          command:
            - "grpc-as"
            - "--socket"
            - "0.0.0.0:{{ .Values.as.service.port }}"
            - "--config-file"
            - "/etc/attestation-service/config.json"
          env:
            - name: RUST_LOG
              value: {{ .Values.log_level | quote }}
            {{- with .Values.as.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: tcp
              containerPort: {{ .Values.as.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.as.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/attestation-service
            - name: sgx-config
              mountPath: /etc/sgx_default_qcnl.conf
              subPath: sgx_default_qcnl.conf
            - name: policy
              mountPath: /opt/confidential-containers/attestation-service/token/ear/policies/opa
            - name: user-keys
              mountPath: /opt/confidential-containers/kbs/user-keys
            - name: data
              mountPath: /opt/confidential-containers/attestation-service
      volumes:
        - name: config
          configMap:
            name: attestation-service-config
        - name: sgx-config
          configMap:
            name: sgx-config
        - name: policy
          emptyDir: {}
        {{- if .Values.kbs.userKeysSecretName }}
        - name: user-keys
          secret:
            optional: true
            secretName: {{ .Values.kbs.userKeysSecretName | quote }}
        {{- else if .Values.kbs.autoGenerateKeys }}
        - name: user-keys
          emptyDir: {}
        {{- end }}
  {{- if not .Values.as.storage.enabled }}
        - name: data
          emptyDir: {}
  {{- end }}
      {{- with .Values.as.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.as.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.as.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- if .Values.as.storage.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ {{ .Values.as.storage.accessMode }} ]
      storageClassName: {{ .Values.as.storage.storageClass }}
      resources:
        requests:
          storage: {{ .Values.as.storage.size }}
{{- end }}

